{% extends 'base.html' %}
{% block title %}Demander une visite{% endblock %}
{% block content %}
<div class="container-sm" style="padding:60px 24px">
  <a href="{% url 'listings:detail' listing.pk %}" style="color:var(--muted);text-decoration:none;font-size:0.85rem;">← Retour à l'annonce</a>
  <div class="form-card mt-2">
    <h2 style="font-family:'Playfair Display',serif;margin-bottom:6px;">📅 Demander une visite</h2>
    <p style="color:var(--muted);font-size:0.88rem;margin-bottom:20px;">{{ listing.title }} — {{ listing.city }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date souhaitée</label>
          {{ form.date }}
        </div>
        <div class="form-group">
          <label class="form-label">Heure souhaitée</label>
          {{ form.time_slot }}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note (optionnel)</label>
        {{ form.note }}
      </div>
      <button type="submit" class="btn btn-gold">📅 Envoyer la demande</button>
    </form>
  </div>
</div>
{% endblock %}
